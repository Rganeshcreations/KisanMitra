<!DOCTYPE html>
<html>
<head>
<title>Expert Details</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
.main{padding:30px;}

.profile{
position:absolute;
top:20px;
right:20px;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
cursor:pointer;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="profile">
<img src="https://via.placeholder.com/80" onclick="openProfile()">
</div>

<div class="main">

<h2>Expert Activity</h2>

<div class="card">
<h3>Questions & Answers</h3>
<div id="qa"></div>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const expertId = params.get("id");
const name = params.get("name");

function openProfile(){
localStorage.setItem("viewExpertId", expertId);
localStorage.setItem("viewExpertName", name);
window.location.href = "expert-view.html";
}

async function loadQA(){

const data = await fetch(
`http://localhost:5000/api/users/expert-questions/${expertId}`
).then(r=>r.json());

let html="";

data.forEach(q=>{
html+=`
<p><b>Farmer:</b> ${q.farmer_name}</p>
<p><b>Q:</b> ${q.question}</p>
<p><b>A:</b> ${q.answer || "Not answered"}</p>
<hr>
`;
});

document.getElementById("qa").innerHTML = html;
}

loadQA();

</script>

</body>
</html>
