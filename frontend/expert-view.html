<!DOCTYPE html>
<html>

<head>
<title>Expert Profile View</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(rgba(0,100,0,0.7), rgba(0,0,0,0.8)),
url("images/farmer-bg.jpg");
background-size:cover;
color:white;
}

.container{
display:flex;
padding:40px;
}

.left-panel{
width:300px;
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:15px;
text-align:center;
}

.left-panel img{
width:150px;
height:150px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
}

.right-panel{
flex:1;
margin-left:40px;
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
}

.info-row{
margin-bottom:15px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<div class="left-panel">

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<h2 id="expertName"></h2>
<p id="location"></p>

</div>


<div class="right-panel">

<h1>👨‍🌾 Expert Profile</h1>

<div class="info-row">🌾 Specialization: <span id="specialization"></span></div>
<div class="info-row">📅 Experience: <span id="experience"></span></div>
<div class="info-row">🎓 Qualification: <span id="qualification"></span></div>
<div class="info-row">📍 Location: <span id="location2"></span></div>
<div class="info-row">📞 Phone: <span id="phone"></span></div>

</div>

</div>


<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  alert("Please login first");
  window.location.href="login.html";
}


// show expert name
document.getElementById("expertName").innerText = user.name;


// ========================
// LOAD EXPERT PROFILE
// ========================

async function loadProfile(){

  try{

    const response = await fetch(
      "http://localhost:5000/api/users/expert-profile/" + user.id
    );

    const profile = await response.json();

    if(profile.exists === false){

      alert("Expert profile not created");
      window.location.href = "expert-profile.html";
      return;

    }

    document.getElementById("specialization").innerText = profile.specialization;
    document.getElementById("experience").innerText = profile.experience + " years";
    document.getElementById("qualification").innerText = profile.qualification;
    document.getElementById("location").innerText = profile.location;
    document.getElementById("location2").innerText = profile.location;
    document.getElementById("phone").innerText = profile.phone;

  }
  catch(error){

    console.log("Profile load error:", error);
    alert("Failed to load expert profile");

  }

}

loadProfile();

</script>

</body>
</html>
